spring:
  datasource:
    url: jdbc:postgresql://${DB_CLUSTER_ENDPOINT}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}

  cloud:
    aws:
      sqs:
        queue-url: ${SQS_QUEUE_URL}
        endpoint-url: ${SQS_ENDPOINT_URL:http://floci:4566}

aws:
  dynamodb:
    endpoint-url: ${DYNAMODB_ENDPOINT_URL:http://floci:4566}
    table-name: ${DYNAMODB_TABLE_NAME:cloudledger-projections}

spring:
  application:
    name: api

  flyway:
    enabled: false
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    schemas: cloudledger

  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        default_schema: cloudledger
    show-sql: false

  cloud:
    aws:
      sqs:
        queue-url: http://localhost:4566/000000000000/cloudledger-events
        endpoint-url: http://localhost:4566
      region: us-east-1

  data:
    redis:
      host: localhost
      port: 6379

  datasource:
    url: jdbc:aws-wrapper:postgresql://localhost:7001/cloudledger
    username: admin
    password: secret123
    driver-class-name: software.amazon.jdbc.Driver

management:
  endpoints:
    web:
      exposure:
        include: health
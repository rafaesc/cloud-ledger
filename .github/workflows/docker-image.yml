name: Docker Image CI

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'terraform/**'
  pull_request:
    branches: [master]
    paths:
      - 'api/**'
      - 'terraform/**'

permissions:
  contents: read

env:
  API_IMAGE: localhost:5100/000000000000/us-east-1/cloudledger/api

jobs:
  build-and-healthcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Start Floci
        run: docker compose up -d --wait

      - name: Provision infrastructure
        working-directory: terraform/envs/local
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -target=module.networking \
            -target=module.messaging \
            -target=module.storage \
            -target=module.auth

      - name: Wait for RDS proxy port
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 7001; then
              echo "RDS proxy is up on :7001"
              break
            fi
            echo "Waiting for RDS proxy... ($i)"
            sleep 3
          done

      - name: Run Flyway migrations
        working-directory: api
        run: |
          ./gradlew flywayMigrate \
            -Pflyway.url="jdbc:postgresql://localhost:7001/cloudledger" \
            -Pflyway.user=admin \
            -Pflyway.password=secret123

      - name: Build API image
        run: docker build -t cloud-ledger-api-test ./api

      - name: Run API container
        working-directory: terraform/envs/local
        run: |
          POOL_ID=$(terraform output -raw cognito_pool_id)
          docker run -d \
            --network host \
            -e SPRING_DATA_REDIS_PORT=7379 \
            -e COGNITO_JWK_SET_URI="http://localhost:4566/${POOL_ID}/.well-known/jwks.json" \
            --name cl-test \
            cloud-ledger-api-test \
            java \
              -XX:+UseContainerSupport \
              -XX:MaxRAMPercentage=75.0 \
              -XX:+UseG1GC \
              -XX:+UseStringDeduplication \
              -Djava.security.egd=file:/dev/./urandom \
              -jar /app/app.jar

      - name: Wait for /actuator/health
        run: |
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              curl -s http://localhost:8080/actuator/health | python3 -m json.tool
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting..."
            sleep 5
          done
          echo "App did not become healthy in time"
          docker logs cl-test
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker logs cl-test 2>&1 || true

  docker-push:
    runs-on: ubuntu-latest
    needs: build-and-healthcheck
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 20

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - name: Start Floci
        run: docker compose up -d --wait

      - name: Provision ECR repository
        working-directory: terraform/envs/local
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -target=module.compute.aws_ecr_repository.api

      - name: Build API image
        run: |
          docker build \
            -t ${{ env.API_IMAGE }}:${{ github.sha }} \
            -t ${{ env.API_IMAGE }}:latest \
            ./api

      - name: Login to ECR
        run: |
          aws ecr get-login-password --endpoint-url $AWS_ENDPOINT_URL \
            | docker login --username AWS --password-stdin localhost:5100

      - name: Push image
        run: |
          docker push ${{ env.API_IMAGE }}:${{ github.sha }}
          docker push ${{ env.API_IMAGE }}:latest

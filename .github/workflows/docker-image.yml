name: Docker Image CI

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
      - 'terraform/**'
  pull_request:
    branches: [master]
    paths:
      - 'api/**'
      - 'terraform/**'

jobs:
  build-and-healthcheck:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Start Floci
        run: docker compose up -d --wait

      - name: Provision infrastructure
        working-directory: terraform/envs/local
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -target=module.networking \
            -target=module.messaging \
            -target=module.storage

      - name: Wait for RDS proxy port
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 7001; then
              echo "RDS proxy is up on :7001"
              break
            fi
            echo "Waiting for RDS proxy... ($i)"
            sleep 3
          done

      - name: Run Flyway migrations
        working-directory: api
        run: |
          ./gradlew flywayMigrate \
            -Pflyway.url="jdbc:postgresql://localhost:7001/cloudledger" \
            -Pflyway.user=admin \
            -Pflyway.password=secret123

      - name: Build API image
        run: docker build -t cloud-ledger-api-test ./api

      - name: Run API container
        run: |
          docker run -d \
            --network host \
            -e SPRING_DATA_REDIS_PORT=7379 \
            --name cl-test \
            cloud-ledger-api-test \
            java \
              -XX:+UseContainerSupport \
              -XX:MaxRAMPercentage=75.0 \
              -XX:+UseG1GC \
              -XX:+UseStringDeduplication \
              -Djava.security.egd=file:/dev/./urandom \
              -jar /app/app.jar

      - name: Wait for /actuator/health
        run: |
          for i in $(seq 1 40); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              http://localhost:8080/actuator/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (HTTP 200)"
              curl -s http://localhost:8080/actuator/health | python3 -m json.tool
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — waiting..."
            sleep 5
          done
          echo "App did not become healthy in time"
          docker logs cl-test
          exit 1

      - name: Print container logs on failure
        if: failure()
        run: docker logs cl-test 2>&1 || true

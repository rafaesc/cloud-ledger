name: Outbox Poller

on:
  push:
    branches: [master]
    paths:
      - 'api/src/resources/db/**'
      - 'lambdas/**'
  pull_request:
    branches: [master]
    paths:
      - 'api/src/resources/db/**'
      - 'lambdas/**'

env:
  IMAGE: localhost:5100/000000000000/us-east-1/cloudledger/outbox-poller

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          working-directory: lambdas

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: lambdas

      - name: Lint
        run: uv run ruff check .
        working-directory: lambdas

      - name: Run tests
        run: uv run pytest --tb=short
        working-directory: lambdas

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            -f outbox_poller/Dockerfile \
            .
        working-directory: lambdas

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Start Floci
        run: docker compose up -d --wait

      - name: Provision infrastructure
        working-directory: terraform/envs/local
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve

      - name: Wait for RDS proxy port
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 7001; then
              echo "RDS proxy is up on :7001"
              break
            fi
            echo "Waiting for RDS proxy... ($i)"
            sleep 3
          done

      - name: Run Flyway migrations
        run: ./gradlew flywayMigrate
        working-directory: api

      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            -f outbox_poller/Dockerfile \
            .
        working-directory: lambdas

      - name: Login to ECR
        run: |
          aws ecr get-login-password --endpoint-url $AWS_ENDPOINT_URL \
            | docker login --username AWS --password-stdin localhost:5100

      - name: Push image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name outbox-poller \
            --image-uri ${{ env.IMAGE }}:${{ github.sha }} \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Invoke Lambda (smoke test)
        run: |
          aws lambda invoke \
            --function-name outbox-poller \
            /tmp/out.json \
            --endpoint-url $AWS_ENDPOINT_URL

          echo "Response:"
          cat /tmp/out.json

          # Fail the job if Lambda returned a handled or unhandled error
          if cat /tmp/out.json | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1 if 'errorMessage' in d else 0)"; then
            echo "Lambda smoke test passed"
          else
            echo "Lambda smoke test FAILED"
            exit 1
          fi

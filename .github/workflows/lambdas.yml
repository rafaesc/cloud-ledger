name: Lambdas

on:
  push:
    branches: [master]
    paths:
      - 'api/src/main/resources/db/**'
      - 'lambdas/**'
      - 'terraform/**'
  pull_request:
    branches: [master]
    paths:
      - 'api/src/main/resources/db/**'
      - 'lambdas/**'
      - 'terraform/**'

permissions:
  contents: read

env:
  OUTBOX_POLLER_IMAGE: localhost:5100/000000000000/us-east-1/cloudledger/outbox-poller
  PROJECTOR_IMAGE: localhost:5100/000000000000/us-east-1/cloudledger/projector

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          working-directory: lambdas

      - name: Install dependencies
        run: uv sync --group dev
        working-directory: lambdas

      - name: Lint
        run: uv run ruff check .
        working-directory: lambdas

      - name: Type check
        run: uv run mypy .
        working-directory: lambdas

      - name: Run tests
        run: uv run pytest --tb=short
        working-directory: lambdas

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build outbox-poller image
        run: |
          docker build \
            -t ${{ env.OUTBOX_POLLER_IMAGE }}:${{ github.sha }} \
            -t ${{ env.OUTBOX_POLLER_IMAGE }}:latest \
            -f outbox_poller/Dockerfile \
            .
        working-directory: lambdas

      - name: Build projector image
        run: |
          docker build \
            -t ${{ env.PROJECTOR_IMAGE }}:${{ github.sha }} \
            -t ${{ env.PROJECTOR_IMAGE }}:latest \
            -f projector/Dockerfile \
            .
        working-directory: lambdas

  docker-push:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 30

    env:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      AWS_ENDPOINT_URL: http://localhost:4566

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Start Floci
        run: docker compose up -d --wait

      - name: Provision infrastructure
        working-directory: terraform/envs/local
        run: |
          terraform init -input=false
          terraform apply -input=false -auto-approve \
            -target=module.networking \
            -target=module.messaging \
            -target=module.storage \
            -target=module.compute

      - name: Wait for RDS proxy port
        run: |
          for i in $(seq 1 30); do
            if nc -z localhost 7001; then
              echo "RDS proxy is up on :7001"
              break
            fi
            echo "Waiting for RDS proxy... ($i)"
            sleep 3
          done

      - name: Run Flyway migrations
        working-directory: api
        run: |
          ./gradlew flywayMigrate \
            -Pflyway.url="jdbc:postgresql://localhost:7001/cloudledger" \
            -Pflyway.user=admin \
            -Pflyway.password=secret123

      - name: Build images
        run: |
          docker build \
            -t ${{ env.OUTBOX_POLLER_IMAGE }}:${{ github.sha }} \
            -t ${{ env.OUTBOX_POLLER_IMAGE }}:latest \
            -f outbox_poller/Dockerfile \
            .
          docker build \
            -t ${{ env.PROJECTOR_IMAGE }}:${{ github.sha }} \
            -t ${{ env.PROJECTOR_IMAGE }}:latest \
            -f projector/Dockerfile \
            .
        working-directory: lambdas

      - name: Login to ECR
        run: |
          aws ecr get-login-password --endpoint-url $AWS_ENDPOINT_URL \
            | docker login --username AWS --password-stdin localhost:5100

      - name: Push outbox-poller image
        run: |
          docker push ${{ env.OUTBOX_POLLER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.OUTBOX_POLLER_IMAGE }}:latest

      - name: Push projector image
        run: |
          docker push ${{ env.PROJECTOR_IMAGE }}:${{ github.sha }}
          docker push ${{ env.PROJECTOR_IMAGE }}:latest

      - name: Update outbox-poller Lambda
        run: |
          aws lambda update-function-code \
            --function-name outbox-poller \
            --image-uri ${{ env.OUTBOX_POLLER_IMAGE }}:${{ github.sha }} \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Update projector Lambda
        run: |
          aws lambda update-function-code \
            --function-name projector \
            --image-uri ${{ env.PROJECTOR_IMAGE }}:${{ github.sha }} \
            --endpoint-url $AWS_ENDPOINT_URL

      - name: Smoke test outbox-poller
        run: |
          aws lambda invoke \
            --function-name outbox-poller \
            /tmp/out.json \
            --endpoint-url $AWS_ENDPOINT_URL

          echo "Response:"
          cat /tmp/out.json

          if cat /tmp/out.json | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1 if 'errorMessage' in d else 0)"; then
            echo "outbox-poller smoke test passed"
          else
            echo "outbox-poller smoke test FAILED"
            exit 1
          fi

      - name: Smoke test projector
        run: |
          aws lambda invoke \
            --function-name projector \
            --payload '{"Records":[]}' \
            --cli-binary-format raw-in-base64-out \
            /tmp/projector-out.json \
            --endpoint-url $AWS_ENDPOINT_URL

          echo "Response:"
          cat /tmp/projector-out.json

          if cat /tmp/projector-out.json | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(1 if 'errorMessage' in d else 0)"; then
            echo "projector smoke test passed"
          else
            echo "projector smoke test FAILED"
            exit 1
          fi

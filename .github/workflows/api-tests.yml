name: API Tests

on:
  push:
    branches: [master]
    paths:
      - 'api/**'
  pull_request:
    branches: [master]
    paths:
      - 'api/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run API tests
        run: ./gradlew test
        working-directory: api

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: api/build/reports/tests/test/
          retention-days: 7

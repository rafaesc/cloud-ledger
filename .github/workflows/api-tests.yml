name: API Tests

on:
  push:
    # Run on every branch (feature branches included) so a new branch gets CI
    # before a PR exists. Tag pushes are excluded (a `branches` filter never
    # matches tags) — releases go through deploy-prod.yml instead.
    branches:
      - '**'
    paths:
      - 'api/**'
      - '.github/workflows/api-tests.yml'
  pull_request:
    branches: [master]
    paths:
      - 'api/**'
      - '.github/workflows/api-tests.yml'

permissions:
  contents: read
  actions: write

# Cancel superseded runs on the same ref so rapid pushes don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run API tests
        run: ./gradlew test
        working-directory: api

      - name: Publish test report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: test-report-${{ github.run_id }}
          path: api/build/reports/tests/test/
          retention-days: 7
